name: Visual Regression

on:
  workflow_call:
    inputs:
      pr-number:
        required: false
        type: number

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run visual regression tests
        run: npm run test:visual

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: test-results/
          retention-days: 7

      - name: Comment on PR with visual diff info
        if: failure() && inputs.pr-number
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Visual Regression Tests Failed',
              '',
              'Screenshots differ from baselines. This may be an intentional change or a regression.',
              '',
              '**To review:** Download the `visual-regression-diffs` artifact from this workflow run.',
              '',
              '**To update baselines (if changes are intentional):**',
              '```bash',
              'npm run test:visual:update',
              'git add test/visual/snapshots/',
              'git commit -m "chore: update visual regression baselines"',
              '```',
            ].join('\n')

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr-number }},
              body,
            })
