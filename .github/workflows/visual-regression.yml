name: Visual Regression

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: read

jobs:
  visual-regression:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/visual-regression') &&
      (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Add reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            })

      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            })
            core.setOutput('ref', pr.data.head.ref)
            core.setOutput('sha', pr.data.head.sha)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --- Baseline from main ---
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: baseline

      - name: Install dependencies (main)
        run: npm ci
        working-directory: baseline

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: baseline

      - name: Generate baseline screenshots
        run: npx playwright test --update-snapshots
        working-directory: baseline

      # --- Current branch ---
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}
          path: current

      - name: Install dependencies (PR)
        run: npm ci
        working-directory: current

      - name: Copy baseline snapshots to PR branch
        run: |
          mkdir -p current/test/visual/snapshots
          cp baseline/test/visual/snapshots/* current/test/visual/snapshots/

      - name: Compare screenshots against baseline
        run: npx playwright test
        working-directory: current

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: current/test-results/
          retention-days: 7

      - name: Comment on PR with visual diff info
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Visual Regression Tests Failed',
              '',
              'Screenshots differ from the `main` branch. This may be an intentional change or a regression.',
              '',
              '**To review:** Download the `visual-regression-diffs` artifact from this workflow run.',
              'Each diff folder contains `*-expected.png` (main), `*-actual.png` (this PR), and `*-diff.png`.',
              '',
              'If the visual changes are intentional, a maintainer can approve and merge.',
            ].join('\n')

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })

      - name: Comment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## Visual Regression Tests Passed\n\nNo visual differences detected compared to `main`.',
            })
